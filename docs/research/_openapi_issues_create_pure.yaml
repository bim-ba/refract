paths:
  /issues/:
    post:
      operationId: issues_create
      summary: Create a Tracker issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCreate'
      responses:
        "201":
          description: The created issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
components:
  schemas:
    IssueCreate:
      type: object
      additionalProperties: true
      required: [queue, summary]
      properties:
        queue:
          type: string
          description: Key of the target queue.
        summary:
          type: string
          description: Issue title.
        type:
          description: Issue type — {'key': ...} object or a bare type key.
          anyOf:
            - type: object
              properties:
                key: { type: string }
            - type: string
        priority:
          description: Priority — {'key': ...} object or a bare priority key.
          anyOf:
            - type: object
              properties:
                key: { type: string }
            - type: string
        parent:
          type: string
          description: Parent issue key.
        description:
          type: string
          description: Issue description (YFM markdown).
        tags:
          description: Tags — a replace list, or an {'add'|'set'|'remove': [...]} operator edit.
          anyOf:
            - type: array
              items: { type: string }
            - type: object
              properties:
                add: { type: array, items: { type: string } }
                set: { type: array, items: { type: string } }
                remove: { type: array, items: { type: string } }
    Issue:
      type: object
      properties:
        key: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        type: { type: string, nullable: true }
        status: { type: string, nullable: true }
        priority: { type: string, nullable: true }
        epic: { type: string, nullable: true }
        parent: { type: string, nullable: true }
        queue: { type: string, nullable: true }
        assignee: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
