name: CI

on:
  push:
  pull_request:

# Least privilege: CI only reads the repo and runs tests.
permissions:
  contents: read

# Supersede in-flight runs for the same ref — the latest commit is all that matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      # Lint/format/types are Python-version-independent — run them once (on 3.12) instead of
      # in every matrix leg. pytest stays in every leg (the only version-sensitive step).
      - name: Format check
        if: matrix.python-version == '3.12'
        run: uv run ruff format --check .
      - name: Lint
        if: matrix.python-version == '3.12'
        run: uv run ruff check .
      - name: Type check
        if: matrix.python-version == '3.12'
        run: uv run ty check
      - name: Run tests
        run: uv run pytest
